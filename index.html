<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直リンク🔗</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif; max-width: 900px; margin: 0 auto; padding: 0.75rem; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
  h1 { font-size: 16px; font-weight: 500; margin: 0 0 0.5rem; display: flex; align-items: center; gap: 8px; }
  h1 .count { font-size: 12px; color: #666; font-weight: 400; margin-left: auto; }
  button { font-family: inherit; }
  input { font-family: inherit; }

  .toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .toolbar button { font-size: 12px; padding: 6px 10px; cursor: pointer; background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; min-height: 32px; }
  .toolbar button:hover { background: #f5f5f5; }
  .toolbar button.primary { background: #1d6fdc; color: #fff; border-color: #1d6fdc; font-weight: 500; }
  .toolbar button.primary:hover { background: #1660c4; }
  .status { font-size: 11px; margin-left: auto; }
  .status.loading { color: #666; }
  .status.success { color: #1d9e75; }
  .status.error { color: #c00; }

  .url-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 0.5rem; padding: 6px; background: #f5f5f5; border-radius: 8px; }
  #generated-url {
    flex: 1; min-width: 0;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 11px; padding: 8px 10px;
    background: #fff; border-radius: 6px;
    border: 0.5px solid rgba(0,0,0,0.15);
    color: #888;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    height: 36px; line-height: 20px;
  }
  #generated-url.has-url { color: #1a1a1a; }
  .url-bar button { font-size: 12px; padding: 0 12px; cursor: pointer; background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 6px; height: 36px; flex-shrink: 0; white-space: nowrap; }
  .url-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  .url-bar button:not(:disabled):hover { background: #f0f0f0; }
  .url-bar button.go-btn { background: #d92d20; color: #fff; border-color: #d92d20; font-weight: 500; }
  .url-bar button.go-btn:not(:disabled):hover { background: #ba241a; }

  .input-section {
    background: #fffaf0;
    border: 0.5px solid #f5d792;
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 0.5rem;
  }
  .input-label { font-size: 11px; color: #6b5400; margin-bottom: 6px; font-weight: 500; }
  .input-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 6px;
  }
  .code-input {
    flex: 1 1 90px; min-width: 80px; max-width: 160px;
    height: 32px;
    padding: 4px 8px;
    font-size: 13px;
    font-family: ui-monospace, monospace;
    border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 5px;
    background: #fff;
    text-transform: uppercase;
  }
  .code-input::placeholder { color: #dcc9a0; text-transform: none; font-family: inherit; }
  .input-controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    font-size: 11px;
  }
  .input-controls button {
    font-size: 11px; padding: 4px 10px; cursor: pointer;
    background: #fff; border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 5px;
  }
  .input-controls button:hover { background: #f5f5f5; }
  .input-controls label { display: flex; align-items: center; gap: 4px; }
  .input-controls input[type="number"] {
    width: 50px; height: 28px; padding: 2px 6px;
    font-size: 13px; text-align: center;
    border: 0.5px solid rgba(0,0,0,0.2); border-radius: 4px;
    -moz-appearance: textfield;
  }
  .input-controls input[type="number"]::-webkit-outer-spin-button,
  .input-controls input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .match-info { color: #6b5400; margin-left: auto; }
  .match-info .unmatched { color: #c00; }

  .options-row { display: flex; gap: 12px; margin-bottom: 0.5rem; font-size: 11px; color: #666; flex-wrap: wrap; align-items: center; }
  .options-row label { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; }
  .options-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }
  #action-feedback { margin-left: auto; font-size: 11px; color: #1d9e75; min-height: 14px; }

  .tabs { display: flex; gap: 2px; margin-bottom: 0.5rem; border-bottom: 0.5px solid rgba(0,0,0,0.15); }
  .tab-btn { background: transparent; border: none; padding: 8px 10px; font-size: 12px; cursor: pointer; min-height: 36px; flex: 1; color: #666; }
  .tab-btn.active { background: #f5f5f5; font-weight: 500; color: #1a1a1a; }
  .tab-btn .tab-count { font-size: 10px; color: #999; margin-left: 2px; }
  .tab-btn.active .tab-count { color: #666; }

  #product-list { max-height: calc(100vh - 320px); overflow-y: auto; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; -webkit-overflow-scrolling: touch; }

  .row { display: flex; align-items: center; gap: 6px; padding: 8px 6px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .row:last-child { border-bottom: none; }
  .row.selected { background: #eaf3fc; }
  .row.matched { border-left: 3px solid #f5b800; }

  .row .toggle { width: 20px; height: 20px; flex-shrink: 0; cursor: pointer; }

  .qty-controls { display: flex; align-items: center; gap: 0; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 5px; overflow: hidden; background: #fff; }
  .qty-btn { width: 24px; height: 26px; background: #fff; border: none; font-size: 13px; cursor: pointer; padding: 0; line-height: 1; color: #1a1a1a; user-select: none; }
  .qty-btn:hover { background: #f0f0f0; }
  .qty-btn:active { background: #e0e0e0; }
  .qty-input { width: 26px; height: 26px; font-size: 12px; text-align: center; border: none; border-left: 0.5px solid rgba(0,0,0,0.15); border-right: 0.5px solid rgba(0,0,0,0.15); -moz-appearance: textfield; padding: 0; background: #fff; }
  .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; font-weight: 500; }
  .badge-blind { background: #e6f1fb; color: #0c447c; }
  .badge-single { background: #faeeda; color: #854f0b; }
  .badge-soldout { background: #fcebeb; color: #791f1f; margin-left: 4px; }
  .badge-code { background: #f0f0f0; color: #555; margin-left: 4px; font-family: ui-monospace, monospace; }
  .badge-target { background: #fff3cd; color: #6b5400; margin-left: 4px; font-weight: 600; }

  .row .name { flex: 1; font-size: 14px; line-height: 1.35; min-width: 0; }
  .row .name .title { font-weight: 500; word-break: break-word; }
  .row .name .variant-label { font-size: 12px; color: #555; margin-top: 1px; }
  .row .name .meta { font-size: 10px; color: #999; margin-top: 1px; font-family: ui-monospace, monospace; }

  .empty-msg { padding: 2rem; text-align: center; color: #888; font-size: 13px; }

  @media (max-width: 600px) {
    body { padding: 0.5rem; }
    h1 { font-size: 14px; }
    h1 .count { font-size: 11px; }
    .toolbar button { font-size: 11px; padding: 6px 8px; min-height: 30px; }
    .status { font-size: 10px; }
    #generated-url { font-size: 10px; padding: 6px 8px; height: 32px; line-height: 18px; }
    .url-bar button { font-size: 11px; padding: 0 8px; height: 32px; }
    .tab-btn { font-size: 12px; padding: 8px 6px; }
    .options-row { font-size: 11px; gap: 10px; }
    .row { gap: 5px; padding: 8px 4px; }
    .row .toggle { width: 22px; height: 22px; }
    .row .name { font-size: 14px; }
    .row .name .variant-label { font-size: 12px; }
    .row .name .meta { font-size: 10px; }
    .qty-btn { width: 26px; height: 28px; font-size: 14px; }
    .qty-input { width: 26px; height: 28px; font-size: 12px; }
    .badge { font-size: 10px; padding: 1px 4px; }
    .code-input { flex: 1 1 70px; font-size: 12px; height: 30px; }
    .input-section { padding: 6px 8px; }
    #product-list { max-height: calc(100vh - 360px); }
  }
</style>
</head>
<body>

<h1>直リンク🔗 <span class="count" id="selected-count">0 商品</span></h1>

<div class="toolbar">
  <button id="reload-btn" class="primary">再読込</button>
  <button id="clear-btn">選択クリア</button>
  <button id="select-all-btn" title="コード関係なく全商品をチェック">全選択</button>
  <span id="status" class="status loading">読み込み中...</span>
</div>

<div class="url-bar">
  <div id="generated-url">商品を選択するとURLが生成されます</div>
  <button id="copy-btn" disabled>コピー</button>
  <button id="open-btn" class="go-btn" disabled>開く</button>
</div>

<div class="input-section">
  <div class="input-label">事前入力コード（例: Z628 / Z065-1 / A032）— マッチした商品は自動でチェック</div>
  <div class="input-grid" id="input-grid"></div>
  <div class="input-controls">
    <label>数量初期値: <input type="number" id="default-qty" min="1" max="99" value="1" /></label>
    <span class="match-info" id="match-info"></span>
  </div>
</div>

<div class="options-row">
  <label><input type="checkbox" id="hide-soldout"> 売切を非表示</label>
  <label><input type="checkbox" id="show-fullname"> 商品名を全表示</label>
  <span id="action-feedback"></span>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="all">すべて<span class="tab-count" id="count-all"></span></button>
  <button class="tab-btn" data-tab="target">対象<span class="tab-count" id="count-target"></span></button>
  <button class="tab-btn" data-tab="blind">ブラインド<span class="tab-count" id="count-blind"></span></button>
  <button class="tab-btn" data-tab="single">単品<span class="tab-count" id="count-single"></span></button>
</div>

<div id="product-list">
  <div class="empty-msg">商品データを取得しています...</div>
</div>

<script>
(function() {
  const BASE = 'https://www.mellojoyjapan.com';
  const COLLECTIONS = [
    { handle: 'mellojoy', tag: 'blind', label: 'ブラインド' },
    { handle: 'mellojoy-\u5355\u54C1', tag: 'single', label: '単品' }
  ];
  const INPUTS_KEY = 'mellojoy_inputs_v2';
  const DEFAULT_QTY_KEY = 'mellojoy_default_qty_v2';
  const PRODUCT_CODE_REGEX = /【([A-Z]\d+(?:-\d+)?)】/;
  const FIXED_INPUT_COUNT = 6;
  const PLACEHOLDER_EXAMPLES = ['Z628', 'Z065-1', 'A032', 'Z052-1', 'A050', 'Z040'];

  const NOISE_KEYWORDS = [
    'キャンセル', 'ブラインドボックス', 'ブラインドぼっくす',
    '盲盒', 'おもちゃ', 'おもちや'
  ];

  function cleanProductName(name) {
    if (!name) return '';
    let s = name;
    s = s.replace(/【【[^】]*】】/g, '');
    const pattern = new RegExp(
      '【[^【】]*(?:' + NOISE_KEYWORDS.join('|') + ')[^【】]*】',
      'g'
    );
    s = s.replace(pattern, '');
    s = s.replace(/[\s　]+/g, ' ').trim();
    return s;
  }

  function extractProductCode(title) {
    if (!title) return null;
    const m = title.match(PRODUCT_CODE_REGEX);
    return m ? m[1] : null;
  }

  function extractVariantCode(variantTitle) {
    if (!variantTitle) return null;
    const m = variantTitle.match(PRODUCT_CODE_REGEX);
    return m ? m[1] : null;
  }

  function normalizeCode(s) {
    return String(s || '').trim().replace(/[【】\[\]\s]/g, '').toUpperCase();
  }

  // サブコード判定（例: "Z074-1" は true、"Z074" は false）
  // 末尾が -数字 で終わるかどうかで判定（桁数は問わない）
  function isSubCode(code) {
    return /-\d+$/.test(code);
  }

  // 入力コードと行のマッチング判定
  // - サブコード入力（Z074-1）: variantCode 完全一致のみ
  // - 親コード入力（Z074）: productCode 完全一致のみ
  function matchesInputCode(row, inputCode) {
    const code = normalizeCode(inputCode);
    if (!code) return false;
    if (isSubCode(code)) {
      return !!(row.variantCode && row.variantCode.toUpperCase() === code);
    }
    return !!(row.productCode && row.productCode.toUpperCase() === code);
  }

  let products = [];
  let selected = new Map();
  let inputCodes = [];
  let defaultQty = 1;
  let currentTab = 'all';

  function loadConfig() {
    try {
      const raw = localStorage.getItem(INPUTS_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      inputCodes = Array.isArray(parsed) ? parsed.map(s => String(s || '')) : [];
    } catch (e) { inputCodes = []; }
    // 6個固定: 足りなければ空文字を追加、多ければ切り詰め
    while (inputCodes.length < FIXED_INPUT_COUNT) inputCodes.push('');
    if (inputCodes.length > FIXED_INPUT_COUNT) inputCodes.length = FIXED_INPUT_COUNT;

    try {
      const q = parseInt(localStorage.getItem(DEFAULT_QTY_KEY));
      defaultQty = (q >= 1 && q <= 99) ? q : 1;
    } catch (e) { defaultQty = 1; }
  }

  function saveConfig() {
    try {
      localStorage.setItem(INPUTS_KEY, JSON.stringify(inputCodes));
      localStorage.setItem(DEFAULT_QTY_KEY, String(defaultQty));
    } catch (e) {
      console.error('saveConfig failed', e);
    }
  }

  function getActiveCodes() {
    return inputCodes.map(normalizeCode).filter(Boolean);
  }

  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('product-list');
  const urlEl = document.getElementById('generated-url');
  const countEl = document.getElementById('selected-count');
  const copyBtn = document.getElementById('copy-btn');
  const openBtn = document.getElementById('open-btn');
  const feedbackEl = document.getElementById('action-feedback');
  const hideSoldout = document.getElementById('hide-soldout');
  const showFullname = document.getElementById('show-fullname');
  const inputGrid = document.getElementById('input-grid');
  const matchInfo = document.getElementById('match-info');
  const defaultQtyInput = document.getElementById('default-qty');

  async function fetchCollection(handle) {
    const encoded = encodeURI(handle);
    const target = `${BASE}/collections/${encoded}/products.json?limit=250`;
    const res = await fetch(target, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${handle}`);
    return await res.json();
  }

  async function loadAll() {
    statusEl.textContent = '読込中...';
    statusEl.className = 'status loading';
    products = [];
    const errors = [];
    for (const col of COLLECTIONS) {
      try {
        const data = await fetchCollection(col.handle);
        for (const p of (data.products || [])) {
          products.push({
            id: p.id,
            title: p.title,
            productCode: extractProductCode(p.title),
            tag: col.tag,
            variants: (p.variants || []).map(v => ({
              id: v.id,
              title: v.title,
              available: v.available,
              price: v.price
            }))
          });
        }
      } catch (e) {
        errors.push(`${col.label}: ${e.message}`);
      }
    }
    const blindCount = products.filter(p => p.tag === 'blind').length;
    const singleCount = products.filter(p => p.tag === 'single').length;
    if (errors.length) {
      statusEl.textContent = `失敗 (ブ${blindCount}/単${singleCount})`;
      statusEl.className = 'status error';
    } else {
      statusEl.textContent = `ブ${blindCount} / 単${singleCount}`;
      statusEl.className = 'status success';
    }
    // 再読込時は選択をクリアしてから自動チェック
    selected.clear();
    const matched = applyMatchingCodes();
    updateMatchInfo();
    updateUrl();
    render();
    if (matched > 0) flashFeedback(`コード一致 ${matched} 件を自動チェック`);
  }

  function flattenVariants() {
    const rows = [];
    for (const p of products) {
      const hasMultipleVariants = p.variants.length > 1;
      for (const v of p.variants) {
        const variantCode = extractVariantCode(v.title) || p.productCode;
        rows.push({
          productId: p.id,
          productTitle: p.title,
          productCode: p.productCode,
          variantCode: variantCode,
          tag: p.tag,
          variantId: v.id,
          variantTitle: v.title,
          available: v.available,
          price: v.price,
          showVariantLabel: hasMultipleVariants
        });
      }
    }
    return rows;
  }

  // 入力コードに一致する商品を選択に反映（auto:true）
  // 既存の auto:true 選択のうち今回マッチしなくなったものは削除
  // auto:false（手動・全選択）は保持
  function applyMatchingCodes() {
    const codes = getActiveCodes();
    const allRows = flattenVariants();

    // 今回マッチすべき variantId 集合を構築
    const newAutoVids = new Set();
    for (const code of codes) {
      for (const r of allRows) {
        if (matchesInputCode(r, code)) newAutoVids.add(r.variantId);
      }
    }

    // 既存の auto 選択のうち、今回マッチしないものを削除
    for (const [vid, info] of Array.from(selected.entries())) {
      if (info.auto && !newAutoVids.has(vid)) {
        selected.delete(vid);
      }
    }

    // 新規 auto 選択を追加（URL順序を入力欄順で構築）
    let added = 0;
    for (const code of codes) {
      for (const r of allRows) {
        if (matchesInputCode(r, code) && !selected.has(r.variantId)) {
          selected.set(r.variantId, { qty: defaultQty, auto: true });
          added++;
        }
      }
    }
    return added;
  }

  // 全選択: コードと無関係に全商品（売切含む）をチェック
  function selectEverything() {
    const allRows = flattenVariants();
    if (allRows.length === 0) {
      flashFeedback('商品データなし', true);
      return;
    }
    selected.clear();
    for (const r of allRows) {
      selected.set(r.variantId, { qty: defaultQty, auto: false });
    }
    updateUrl();
    render();
    flashFeedback(`全 ${allRows.length} 件選択`);
  }

  function updateMatchInfo() {
    const codes = getActiveCodes();
    if (codes.length === 0) {
      matchInfo.innerHTML = '';
      return;
    }
    const allRows = flattenVariants();
    const matched = codes.filter(code =>
      allRows.some(r => matchesInputCode(r, code))
    );
    const unmatched = codes.filter(code =>
      !allRows.some(r => matchesInputCode(r, code))
    );

    let html = `マッチ:${matched.length}件 / 入力${codes.length}件`;
    if (unmatched.length > 0) {
      html += ` <span class="unmatched">(未マッチ:${unmatched.map(escapeHtml).join(', ')})</span>`;
    }
    matchInfo.innerHTML = html;
  }

  function render() {
    let rows = flattenVariants();
    const codes = getActiveCodes();

    // 対象判定: いずれかの入力コードと matchesInputCode で一致
    const isTargetRow = (r) => codes.some(code => matchesInputCode(r, code));

    const allCount = rows.length;
    const blindCount = rows.filter(r => r.tag === 'blind').length;
    const singleCount = rows.filter(r => r.tag === 'single').length;
    const targetCount = rows.filter(isTargetRow).length;
    document.getElementById('count-all').textContent = ` (${allCount})`;
    document.getElementById('count-blind').textContent = ` (${blindCount})`;
    document.getElementById('count-single').textContent = ` (${singleCount})`;
    document.getElementById('count-target').textContent = ` (${targetCount})`;

    rows = rows.filter(r => {
      if (currentTab === 'target') {
        if (!isTargetRow(r)) return false;
      } else if (currentTab !== 'all' && r.tag !== currentTab) {
        return false;
      }
      if (hideSoldout.checked && !r.available) return false;
      return true;
    });

    if (rows.length === 0) {
      listEl.innerHTML = '<div class="empty-msg">該当商品なし</div>';
      return;
    }

    const useFullName = showFullname.checked;

    listEl.innerHTML = rows.map(r => {
      const sel = selected.get(r.variantId);
      const checked = sel ? 'checked' : '';
      const isMatched = isTargetRow(r);
      const rowClasses = ['row'];
      if (sel) rowClasses.push('selected');
      if (isMatched) rowClasses.push('matched');

      const badgeClass = r.tag === 'blind' ? 'badge-blind' : 'badge-single';
      const badgeLabel = r.tag === 'blind' ? 'ブ' : '単';
      const soldOutBadge = !r.available ? '<span class="badge badge-soldout">売切</span>' : '';
      // バッジは variantCode 優先（より具体的）。なければ productCode
      const displayCode = r.variantCode || r.productCode;
      const codeBadge = displayCode ? `<span class="badge badge-code">${escapeHtml(displayCode)}</span>` : '';
      const targetBadge = isMatched ? '<span class="badge badge-target">対象</span>' : '';
      const displayTitle = useFullName ? r.productTitle : cleanProductName(r.productTitle);
      const variantLabel = r.showVariantLabel
        ? `<div class="variant-label">${escapeHtml(r.variantTitle)}</div>`
        : '';
      const qty = sel ? sel.qty : defaultQty;

      return `
        <div class="${rowClasses.join(' ')}" data-vid="${r.variantId}">
          <input type="checkbox" class="toggle" data-vid="${r.variantId}" ${checked} />
          <div class="qty-controls">
            <button class="qty-btn qty-minus" data-vid="${r.variantId}" type="button">−</button>
            <input type="number" class="qty-input" data-vid="${r.variantId}" min="1" max="99" value="${qty}" />
            <button class="qty-btn qty-plus" data-vid="${r.variantId}" type="button">+</button>
          </div>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          <div class="name">
            <div class="title">${escapeHtml(displayTitle)}${codeBadge}${targetBadge}${soldOutBadge}</div>
            ${variantLabel}
            <div class="meta">${r.variantId}</div>
          </div>
        </div>
      `;
    }).join('');

    bindRowEvents();
  }

  function bindRowEvents() {
    listEl.querySelectorAll('.toggle').forEach(el => {
      el.addEventListener('change', e => {
        const vid = parseInt(e.target.dataset.vid);
        if (e.target.checked) {
          const row = e.target.closest('.row');
          const qtyInput = row.querySelector('.qty-input');
          const qty = parseInt(qtyInput.value) || 1;
          selected.set(vid, { qty, auto: false });
        } else {
          selected.delete(vid);
        }
        const row = e.target.closest('.row');
        row.classList.toggle('selected', e.target.checked);
        updateUrl();
      });
    });

    listEl.querySelectorAll('.qty-input').forEach(el => {
      el.addEventListener('input', e => {
        const vid = parseInt(e.target.dataset.vid);
        let v = parseInt(e.target.value);
        if (isNaN(v) || v < 1) v = 1;
        if (v > 99) v = 99;
        e.target.value = v;
        const sel = selected.get(vid);
        if (sel) {
          sel.qty = v;
          updateUrl();
        }
      });
    });

    listEl.querySelectorAll('.qty-minus').forEach(el => {
      el.addEventListener('click', e => {
        const row = e.target.closest('.row');
        const qtyInput = row.querySelector('.qty-input');
        let v = parseInt(qtyInput.value) || 1;
        v = Math.max(1, v - 1);
        qtyInput.value = v;
        qtyInput.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });

    listEl.querySelectorAll('.qty-plus').forEach(el => {
      el.addEventListener('click', e => {
        const row = e.target.closest('.row');
        const qtyInput = row.querySelector('.qty-input');
        let v = parseInt(qtyInput.value) || 1;
        v = Math.min(99, v + 1);
        qtyInput.value = v;
        qtyInput.dispatchEvent(new Event('input', { bubbles: true }));
      });
    });
  }

  function updateUrl() {
    countEl.textContent = `${selected.size} 商品`;
    if (selected.size === 0) {
      urlEl.textContent = '商品を選択するとURLが生成されます';
      urlEl.classList.remove('has-url');
      copyBtn.disabled = true;
      openBtn.disabled = true;
      return;
    }
    const parts = Array.from(selected.entries()).map(([vid, s]) => `${vid}:${s.qty}`);
    const url = `${BASE}/cart/${parts.join(',')}`;
    urlEl.textContent = url;
    urlEl.classList.add('has-url');
    copyBtn.disabled = false;
    openBtn.disabled = false;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function flashFeedback(msg, isError) {
    feedbackEl.textContent = msg;
    feedbackEl.style.color = isError ? '#c00' : '#1d9e75';
    setTimeout(() => { feedbackEl.textContent = ''; }, 2500);
  }

  function renderInputs() {
    inputGrid.innerHTML = inputCodes.map((code, i) => {
      const ph = PLACEHOLDER_EXAMPLES[i] || '';
      return `<input class="code-input" data-idx="${i}" value="${escapeHtml(code)}" placeholder="${ph}" />`;
    }).join('');

    inputGrid.querySelectorAll('.code-input').forEach(el => {
      el.addEventListener('input', e => {
        const idx = parseInt(e.target.dataset.idx);
        inputCodes[idx] = e.target.value;
        saveConfig();
        // 既に商品データがあれば即座に追加チェック（追記式）
        if (products.length > 0) {
          applyMatchingCodes();
          updateUrl();
        }
        updateMatchInfo();
        render();
      });
    });
  }

  copyBtn.addEventListener('click', async () => {
    const text = urlEl.textContent;
    // 方式1: モダン Clipboard API
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        flashFeedback(`コピー済 (${text.length}文字)`);
        return;
      } catch (e) {
        console.error('Clipboard API失敗:', e);
        // フォールバックへ続く
      }
    }
    // 方式2: 旧API (execCommand) フォールバック
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '-9999px';
      ta.setAttribute('readonly', '');
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) {
        flashFeedback(`コピー済(旧API ${text.length}文字)`);
        return;
      }
      flashFeedback('コピー失敗(execCommand returned false)', true);
    } catch (e) {
      console.error('execCommand失敗:', e);
      flashFeedback(`コピー失敗: ${e.message || e}`, true);
    }
  });

  openBtn.addEventListener('click', () => {
    window.location.href = urlEl.textContent;
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === currentTab);
      });
      render();
    });
  });

  hideSoldout.addEventListener('change', render);
  showFullname.addEventListener('change', render);

  defaultQtyInput.addEventListener('input', e => {
    let v = parseInt(e.target.value);
    if (isNaN(v) || v < 1) v = 1;
    if (v > 99) v = 99;
    defaultQty = v;
    saveConfig();
  });

  document.getElementById('reload-btn').addEventListener('click', loadAll);
  document.getElementById('clear-btn').addEventListener('click', () => {
    selected.clear();
    render();
    updateUrl();
  });
  document.getElementById('select-all-btn').addEventListener('click', selectEverything);

  // 初期化
  loadConfig();
  defaultQtyInput.value = defaultQty;
  renderInputs();
  loadAll();
})();
</script>

</body>
</html>
